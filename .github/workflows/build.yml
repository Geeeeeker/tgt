name: Build tgt for Termux and Release

on:
  push:
    tags:
      - 'v*'              # 推送 v 开头的标签时触发
  workflow_dispatch:       # 支持手动触发

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build and package inside Termux container
        run: |
          mkdir -p ${{ runner.temp }}/output
          chmod 777 ${{ runner.temp }}/output

          docker run \
            --platform linux/arm64 \
            -v ${{ runner.temp }}/output:/output \
            termux/termux-docker:aarch64 \
            bash -c '
              set -e

              pkg update -y
              pkg install -y make clang openssl binutils dpkg git

              # 创建缺失的 sys/sem.h 桩头文件（使用 echo 避免 heredoc 缩进问题）
              mkdir -p /data/data/com.termux/files/usr/include/sys
              echo "#ifndef _SYS_SEM_H_" > /data/data/com.termux/files/usr/include/sys/sem.h
              echo "#define _SYS_SEM_H_" >> /data/data/com.termux/files/usr/include/sys/sem.h
              echo "#include <sys/types.h>" >> /data/data/com.termux/files/usr/include/sys/sem.h
              echo "#include <sys/ipc.h>" >> /data/data/com.termux/files/usr/include/sys/sem.h
              echo "struct sembuf {" >> /data/data/com.termux/files/usr/include/sys/sem.h
              echo "    unsigned short sem_num;" >> /data/data/com.termux/files/usr/include/sys/sem.h
              echo "    short sem_op;" >> /data/data/com.termux/files/usr/include/sys/sem.h
              echo "    short sem_flg;" >> /data/data/com.termux/files/usr/include/sys/sem.h
              echo "};" >> /data/data/com.termux/files/usr/include/sys/sem.h
              echo "union semun {" >> /data/data/com.termux/files/usr/include/sys/sem.h
              echo "    int val;" >> /data/data/com.termux/files/usr/include/sys/sem.h
              echo "    struct semid_ds *buf;" >> /data/data/com.termux/files/usr/include/sys/sem.h
              echo "    unsigned short *array;" >> /data/data/com.termux/files/usr/include/sys/sem.h
              echo "};" >> /data/data/com.termux/files/usr/include/sys/sem.h
              echo "static inline int semget(key_t key, int nsems, int semflg) { return -1; }" >> /data/data/com.termux/files/usr/include/sys/sem.h
              echo "static inline int semop(int semid, struct sembuf *sops, size_t nsops) { return -1; }" >> /data/data/com.termux/files/usr/include/sys/sem.h
              echo "static inline int semctl(int semid, int semnum, int cmd, ...) { return -1; }" >> /data/data/com.termux/files/usr/include/sys/sem.h
              echo "#endif" >> /data/data/com.termux/files/usr/include/sys/sem.h

              # 克隆仓库并进入
              git clone --depth 1 --branch "${{ github.ref_name }}" \
                "https://github.com/${{ github.repository }}.git" ~/workspace
              cd ~/workspace

              # 编译（禁用不支持的驱动）
              make ISCSI_RDMA= CEPH_RBD= GLFS_BD= SD_NOTIFY=

              # 安装到临时根目录
              make install DESTDIR=install-root ISCSI_RDMA= CEPH_RBD= GLFS_BD= SD_NOTIFY=

              # 创建 DEBIAN 控制文件（也使用 echo）
              mkdir -p install-root/DEBIAN
              VERSION=$(grep "^VERSION ?=" Makefile | cut -d "=" -f2 | tr -d " ")

              echo "Package: tgt" > install-root/DEBIAN/control
              echo "Version: ${VERSION:-1.0.97}" >> install-root/DEBIAN/control
              echo "Architecture: aarch64" >> install-root/DEBIAN/control
              echo "Maintainer: Your Name <you@example.com>" >> install-root/DEBIAN/control
              echo "Description: Linux SCSI target framework (tgt) for Termux" >> install-root/DEBIAN/control
              echo " Includes tgtd and tgtadm." >> install-root/DEBIAN/control
              echo "Depends: openssl" >> install-root/DEBIAN/control
              echo "Section: net" >> install-root/DEBIAN/control
              echo "Priority: optional" >> install-root/DEBIAN/control

              # 打包并复制到输出目录
              dpkg-deb --build install-root tgt_${VERSION}_aarch64.deb
              cp tgt_*.deb /output/
            '

      - name: Upload .deb to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/output/tgt_*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
