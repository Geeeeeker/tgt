name: Build tgt for Termux and Release

on:
  push:
    tags:
      - 'v*'              # 推送 v* 标签触发
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build and package inside Termux container
        run: |
          mkdir -p ${{ runner.temp }}/output
          chmod 777 ${{ runner.temp }}/output

          docker run \
            --platform linux/arm64 \
            -v ${{ runner.temp }}/output:/output \
            termux/termux-docker:aarch64 \
            bash -c '
              set -e

              pkg update -y
              pkg install -y make clang openssl binutils dpkg git

              # 创建桩头文件，弥补 Termux 缺失的 sys/sem.h
              mkdir -p /data/data/com.termux/files/usr/include/sys
              cat > /data/data/com.termux/files/usr/include/sys/sem.h << "EOF"
              #ifndef _SYS_SEM_H_
              #define _SYS_SEM_H_
              #include <sys/types.h>
              #include <sys/ipc.h>

              struct sembuf {
                  unsigned short sem_num;
                  short sem_op;
                  short sem_flg;
              };

              union semun {
                  int val;
                  struct semid_ds *buf;
                  unsigned short *array;
              };

              static inline int semget(key_t key, int nsems, int semflg) { return -1; }
              static inline int semop(int semid, struct sembuf *sops, size_t nsops) { return -1; }
              static inline int semctl(int semid, int semnum, int cmd, ...) { return -1; }
              #endif
              EOF

              # 克隆仓库
              git clone --depth 1 --branch "${{ github.ref_name }}" \
                "https://github.com/${{ github.repository }}.git" ~/workspace
              cd ~/workspace

              # 编译（禁用 Termux 不支持的驱动模块）
              make ISCSI_RDMA= CEPH_RBD= GLFS_BD= SD_NOTIFY=

              make install DESTDIR=install-root ISCSI_RDMA= CEPH_RBD= GLFS_BD= SD_NOTIFY=

              mkdir -p install-root/DEBIAN
              VERSION=$(grep "^VERSION ?=" Makefile | cut -d "=" -f2 | tr -d " ")
              cat > install-root/DEBIAN/control << EOF
          Package: tgt
          Version: ${VERSION:-1.0.97}
          Architecture: aarch64
          Maintainer: Your Name <you@example.com>
          Description: Linux SCSI target framework (tgt) for Termux
           Includes tgtd and tgtadm.
          Depends: openssl
          Section: net
          Priority: optional
          EOF

              dpkg-deb --build install-root tgt_${VERSION}_aarch64.deb
              cp tgt_*.deb /output/
            '

      - name: Upload .deb to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/output/tgt_*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
